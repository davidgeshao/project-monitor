<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, noimageindex">
<meta name="googlebot" content="noindex, nofollow">
<title>Projects — Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ef;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: rgba(0,0,0,0.08);
    --border-hover: rgba(0,0,0,0.18);
    --text: #1a1815;
    --text-muted: #7a756e;
    --text-faint: #b0aa9f;
    --accent: #1d7a5f;
    --accent-bg: #e8f5f0;
    --radius: 14px;
    --radius-sm: 7px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--text);
    font-size: 15px;
  }

  /* ---- LAYOUT ---- */
  .shell {
    max-width: 1280px;
    margin: 0 auto;
    padding: 44px 32px 80px;
  }

  /* ---- HEADER ---- */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 30px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-left .wordmark {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
  }
  .header-left h1 {
    font-size: 30px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .header-right { text-align: right; }
  .date-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.1em;
  }
  .stats-row {
    display: flex;
    gap: 14px;
    margin-top: 8px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  .stat-pill {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
  }
  .stat-pill.active { border-color: #1d7a5f; color: #1d7a5f; }
  .stat-pill.pending { border-color: #a07020; color: #a07020; }
  .stat-pill.blocked { border-color: #a03020; color: #a03020; }

  /* ---- GRID ---- */
  .projects {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(216px, 1fr));
    gap: 16px;
  }

  /* ---- PROJECT TILE (2:3) ---- */
  .card {
    position: relative;
    aspect-ratio: 2 / 3;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 17px 16px;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.18s, transform 0.18s;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--pr, #ccc);
    opacity: 0.85;
  }
  .card:hover {
    border-color: var(--border-hover);
    box-shadow: 0 8px 28px rgba(0,0,0,0.09);
    transform: translateY(-3px);
  }
  .card.pr-top  { --pr: #c2402b; }
  .card.pr-high { --pr: #b8801f; }
  .card.pr-mid  { --pr: #2e6fbf; }
  .card.pr-low  { --pr: #b0aa9f; }

  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .card-rank {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.05em;
  }
  .card-name {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.22;
    letter-spacing: -0.01em;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-sub {
    font-size: 12.5px;
    color: var(--text-muted);
    margin-top: 6px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-spacer { flex: 1; min-height: 8px; }

  .card-next { margin-bottom: 12px; }
  .card-next-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
    margin-top: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-next-text.empty { color: var(--text-faint); }

  .mini-label {
    font-family: 'DM Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.13em;
    color: var(--text-faint);
    text-transform: uppercase;
  }

  .card-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-top: auto;
  }
  .chat-icon {
    font-size: 13px;
    color: var(--text-faint);
    flex-shrink: 0;
  }

  /* priority badges */
  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .badge-top    { background: #fde8e4; color: #8c2a18; }
  .badge-high   { background: #fef0d8; color: #835510; }
  .badge-mid    { background: #ddeeff; color: #1a4e8c; }
  .badge-low    { background: #eeece8; color: #6a6560; }

  .status-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 3px 9px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    border: 1px solid transparent;
    transition: opacity 0.1s;
  }
  .status-badge:hover { opacity: 0.72; }
  .s-active  { background: #e4f5ee; color: #0f5c3a; border-color: #b5dfcc; }
  .s-pending { background: #fef5e0; color: #7a5010; border-color: #f0d898; }
  .s-blocked { background: #fde8e4; color: #8c2a18; border-color: #f5bfb5; }
  .s-planned { background: #eeece8; color: #4a4540; border-color: #d5d0c8; }
  .s-routine { background: #eeeaff; color: #3a2898; border-color: #c8beff; }

  /* ---- MODAL ---- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,24,21,0.42);
    -webkit-backdrop-filter: blur(3px);
    backdrop-filter: blur(3px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 100;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 18px;
    width: min(540px, 100%);
    max-height: 88vh;
    overflow-y: auto;
    padding: 26px 28px 24px;
    box-shadow: 0 24px 70px rgba(0,0,0,0.28);
    animation: pop 0.16s ease-out;
  }
  @keyframes pop { from { transform: scale(0.97); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .modal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .modal-close {
    border: none;
    background: var(--surface2);
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1;
    transition: background 0.12s;
  }
  .modal-close:hover { background: #e6e1da; }

  .modal-name {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.015em;
    line-height: 1.2;
  }
  .modal-sub {
    font-size: 13.5px;
    color: var(--text-muted);
    margin-top: 5px;
    margin-bottom: 18px;
  }

  .field { margin-bottom: 16px; }
  .field .mini-label { display: block; margin-bottom: 7px; }

  .act-select {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 8px 11px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-hover);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
  }
  .text-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    color: var(--text);
    transition: border-color 0.15s, background 0.15s;
  }
  .text-input:focus { outline: none; border-color: var(--border-hover); background: var(--surface); }

  .notes-area {
    width: 100%;
    background: var(--surface2);
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    padding: 11px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--text);
    resize: vertical;
    min-height: 96px;
    transition: border-color 0.15s, background 0.15s;
  }
  .notes-area:focus { outline: none; border-color: var(--border-hover); background: var(--surface); }
  .notes-area::placeholder, .text-input::placeholder { color: var(--text-faint); }

  .modal-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .updated-note {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.06em;
  }
  .act-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11.5px;
    letter-spacing: 0.04em;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-hover);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background 0.12s;
  }
  .act-btn:hover { background: var(--surface2); }
  .act-btn.chat-btn { background: var(--accent-bg); border-color: #b5dfcc; color: var(--accent); }
  .act-btn.chat-btn:hover { background: #d4eee5; }
  .act-btn.new-btn { background: #f5f0ff; border-color: #c8beff; color: #3a2898; }
  .act-btn.new-btn:hover { background: #ebe4ff; }
  .act-btn.code-btn { cursor: default; opacity: 0.7; }

  /* ---- SYNC ---- */
  .sync-chip {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    transition: border-color 0.12s, color 0.12s, background 0.12s;
  }
  .sync-chip:hover { border-color: var(--border-hover); }
  .sync-chip.s-on   { border-color: #b5dfcc; color: #0f5c3a; background: #e4f5ee; }
  .sync-chip.s-busy { border-color: #f0d898; color: #7a5010; background: #fef5e0; }
  .sync-chip.s-err  { border-color: #f5bfb5; color: #8c2a18; background: #fde8e4; }

  .sync-help { font-size: 12.5px; color: var(--text-muted); line-height: 1.65; margin-bottom: 10px; }
  .sync-help b { color: var(--text); font-weight: 500; }
  .sync-link { display: inline-block; font-family: 'DM Mono', monospace; font-size: 11.5px; color: var(--accent); text-decoration: none; }
  .sync-link:hover { text-decoration: underline; }
  .sync-status { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-faint); margin-top: 12px; min-height: 16px; line-height: 1.5; }
  .sync-status.ok   { color: #0f5c3a; }
  .sync-status.busy { color: #7a5010; }
  .sync-status.err  { color: #8c2a18; }

  /* ---- ENGINE SNAPSHOT (read-only, from engine.snapshot.json) ---- */
  .snapshot {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .snap-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
  .snap-title { font-size: 13px; font-weight: 600; }
  .snap-fresh { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-faint); }
  .snap-fresh.stale { color: #a07020; }
  .snap-brief { font-size: 12.5px; line-height: 1.65; color: var(--text); margin-bottom: 10px; white-space: pre-line; }
  .snap-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .snap-chip {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .snap-chip.done { color: #0f5c3a; background: #e4f5ee; border-color: #b5dfcc; }
  .snap-chip.urgent { color: #8c2a18; background: #fde8e4; border-color: #f5bfb5; }
  .snap-chip.lit { color: #0f5c3a; }
  .snap-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--text-faint);
    text-transform: uppercase;
    margin-right: 4px;
  }

  /* ---- FOOTER ---- */
  .footer {
    margin-top: 36px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .footer-note {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.08em;
  }
  .reset-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 5px 11px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-faint);
    cursor: pointer;
    letter-spacing: 0.08em;
  }
  .reset-btn:hover { border-color: #a03020; color: #a03020; }

  @media (max-width: 560px) {
    .shell { padding: 32px 18px 60px; }
    .header { align-items: flex-start; }
    .header-right, .stats-row { text-align: left; justify-content: flex-start; }
    .projects { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  }
</style>
</head>
<body>

<div class="shell">
  <header class="header">
    <div class="header-left">
      <div class="wordmark">Project Monitor</div>
      <h1>My Projects</h1>
    </div>
    <div class="header-right">
      <div class="date-label" id="today-label"></div>
      <div class="stats-row">
        <span class="stat-pill active" id="stat-active"></span>
        <span class="stat-pill pending" id="stat-pending"></span>
        <span class="stat-pill blocked" id="stat-blocked"></span>
      </div>
    </div>
  </header>

  <section class="snapshot" id="engine-snapshot" style="display:none">
    <div class="snap-head">
      <span class="snap-title">⚙ 引擎快照</span>
      <span class="snap-fresh" id="snap-fresh"></span>
    </div>
    <div id="snap-body"></div>
  </section>

  <div class="projects" id="projects-list"></div>

  <footer class="footer">
    <button class="sync-chip" id="sync-chip" onclick="openSync()">⊘ 本地模式 · 开启同步</button>
    <button class="reset-btn" onclick="confirmReset()">reset to defaults</button>
  </footer>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
</div>

<div class="modal-overlay" id="sync-overlay" onclick="if(event.target===this)closeSync()">
  <div class="modal" id="sync-modal" role="dialog" aria-modal="true"></div>
</div>

<script>
const STORE_KEY = 'pm_standalone_v1';
const UPDATED_KEY = 'pm_updated_at';
const TOKEN_KEY = 'pm_gist_token';
const GIST_ID_KEY = 'pm_gist_id';
const GIST_DESC = 'project-monitor-sync';
const GIST_FILE = 'project-monitor.json';

const DEFAULT_PROJECTS = [
  {
    id: 1,
    name: "CAMO Social Media",
    subtitle: "Plans, execution & content creation",
    priority: "top",
    status: "active",
    nextAction: "Define content calendar & posting schedule",
    lastUpdated: today(),
    notes: "Top priority right now. Social media plans, content creation, Rednote content from survey reports, and more.",
    chatUrl: "https://claude.ai/chat/63ab4146-ce55-402f-a3ad-61c98d011311",
    chatLabel: "Converting survey reports to Rednote content",
    chatMode: "existing"
  },
  {
    id: 2,
    name: "CAMO Research with SZW",
    subtitle: "Research project collaboration",
    priority: "high",
    status: "active",
    nextAction: "Sync with SZW on current progress",
    lastUpdated: today(),
    notes: "Working in Claude Code — no chat link needed.",

    chatLabel: null,
    chatMode: "code"
  },
  {
    id: 3,
    name: "CAMO Research Proposals",
    subtitle: "Propose projects, brief the profs",
    priority: "high",
    status: "planned",
    nextAction: "Draft project proposals for profs",
    lastUpdated: today(),
    notes: "Should propose more projects. Let profs know how they can actually help.",
    chatUrl: "https://claude.ai/chat/new",
    chatLabel: "Start new chat",
    chatMode: "new"
  },
  {
    id: 4,
    name: "CAMO Logo & Website",
    subtitle: "Brand identity and online presence",
    priority: "mid",
    status: "pending",
    nextAction: "Finalize logo direction",
    lastUpdated: today(),
    notes: "",
    chatUrl: "https://claude.ai/chat/de108597-e429-423b-9ecc-3148d539b644",
    chatLabel: "Fractal design for CAMO animated logo",
    chatMode: "existing"
  },
  {
    id: 5,
    name: "燕园叶话 Weekly Routine",
    subtitle: "Automation & workflow optimization",
    priority: "mid",
    status: "routine",
    nextAction: "Work on automation pipeline",
    lastUpdated: today(),
    notes: "Weekly routine. Focus: automating the process.",
    chatUrl: "https://claude.ai/chat/83dd8b52-1e39-4520-8fde-2a85c94a09d4",
    chatLabel: "YYYH Canva & Design",
    chatMode: "existing"
  },
  {
    id: 6,
    name: "Personal Project",
    subtitle: "Photo & video",
    priority: "low",
    status: "planned",
    nextAction: "Review and organize recent shoots",
    lastUpdated: today(),
    notes: "",
    chatUrl: "https://claude.ai/chat/new",
    chatLabel: "Start new chat",
    chatMode: "new"
  },
  {
    id: 7,
    name: "Training",
    subtitle: "HK Race Plan 2026–27 · Log chat",
    priority: "low",
    status: "routine",
    nextAction: "Follow HK Race Training Plan 2026-27",
    lastUpdated: today(),
    notes: "Detailed tracking in the Log chat (DS project). Training plan runs to Jan 2027.",
    chatUrl: "https://claude.ai/chat/c1e26cdc-d144-4f63-8dbb-6c015f16692a",
    chatLabel: "Log (DS project)",
    chatMode: "existing"
  }
];

const PRIORITY_MAP = {
  top:  { cls: 'badge-top',  label: '● TOP' },
  high: { cls: 'badge-high', label: '● HIGH' },
  mid:  { cls: 'badge-mid',  label: '● MID' },
  low:  { cls: 'badge-low',  label: '● LOW' }
};

const STATUS_MAP = {
  active:  { cls: 's-active',  label: 'Active' },
  pending: { cls: 's-pending', label: 'Pending' },
  blocked: { cls: 's-blocked', label: 'Blocked' },
  planned: { cls: 's-planned', label: 'Planned' },
  routine: { cls: 's-routine', label: 'Routine' }
};

const STATUS_CYCLE = ['active','pending','blocked','planned','routine'];

function today() {
  return new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function esc(str) {
  return (str == null ? '' : String(str))
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function persist() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(projects));
    localStorage.setItem(UPDATED_KEY, String(localUpdatedAt));
  } catch(e) {}
}

// Called after any user edit: bump timestamp, save locally, push to gist (if connected).
function commit() {
  localUpdatedAt = Date.now();
  persist();
  schedulePush();
}

let projects = load() || JSON.parse(JSON.stringify(DEFAULT_PROJECTS));
let localUpdatedAt = Number(localStorage.getItem(UPDATED_KEY)) || 0;
let currentModalId = null;

function render() {
  const list = document.getElementById('projects-list');
  list.innerHTML = '';

  projects.forEach((proj, idx) => {
    const p = PRIORITY_MAP[proj.priority];
    const s = STATUS_MAP[proj.status];

    const card = document.createElement('div');
    card.className = 'card pr-' + proj.priority;
    card.onclick = () => openModal(proj.id);

    let chatIcon = '';
    if (proj.chatMode === 'code') chatIcon = '⌨';
    else if (proj.chatMode === 'new') chatIcon = '✦';
    else if (proj.chatUrl) chatIcon = '↗';

    const naText = proj.nextAction
      ? `<div class="card-next-text">${esc(proj.nextAction)}</div>`
      : `<div class="card-next-text empty">— tap to add</div>`;

    card.innerHTML = `
      <div class="card-head">
        <span class="card-rank">${String(idx + 1).padStart(2,'0')}</span>
        <span class="badge ${p.cls}">${p.label}</span>
      </div>
      <div class="card-name">${esc(proj.name)}</div>
      <div class="card-sub">${esc(proj.subtitle)}</div>
      <div class="card-spacer"></div>
      <div class="card-next">
        <div class="mini-label">Next action</div>
        ${naText}
      </div>
      <div class="card-foot">
        <span class="status-badge ${s.cls}" onclick="cycleStatus(event, ${proj.id})">${s.label}</span>
        <span class="chat-icon">${chatIcon}</span>
      </div>
    `;
    list.appendChild(card);
  });

  updateStats();
}

function openModal(id) {
  const proj = projects.find(p => p.id === id);
  if (!proj) return;
  const p = PRIORITY_MAP[proj.priority];

  let chatBtn = '';
  if (proj.chatMode === 'code') {
    chatBtn = `<span class="act-btn code-btn">⌨ Working in Claude Code</span>`;
  } else if (proj.chatMode === 'new') {
    chatBtn = `<a class="act-btn new-btn" href="${esc(proj.chatUrl)}" target="_blank" rel="noopener">✦ Start new chat ↗</a>`;
  } else if (proj.chatUrl) {
    chatBtn = `<a class="act-btn chat-btn" href="${esc(proj.chatUrl)}" target="_blank" rel="noopener">↗ ${esc(proj.chatLabel) || 'Open chat'}</a>`;
  }

  const statusOpts = Object.entries(STATUS_MAP)
    .map(([k,v]) => `<option value="${k}" ${k===proj.status?'selected':''}>${v.label}</option>`).join('');

  document.getElementById('modal').innerHTML = `
    <div class="modal-head">
      <span class="badge ${p.cls}">${p.label}</span>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">✕</button>
    </div>
    <h2 class="modal-name">${esc(proj.name)}</h2>
    <div class="modal-sub">${esc(proj.subtitle)}</div>

    <div class="field">
      <label class="mini-label">Status</label>
      <select class="act-select" onchange="setStatus(${proj.id}, this.value)">${statusOpts}</select>
    </div>

    <div class="field">
      <label class="mini-label">Next action</label>
      <input class="text-input" id="m-na" value="${esc(proj.nextAction)}"
             placeholder="What's the next step?" oninput="saveNA(${proj.id}, this.value)">
    </div>

    <div class="field">
      <label class="mini-label">Notes</label>
      <textarea class="notes-area" placeholder="Notes… (auto-saved as you type)"
                oninput="saveNotes(${proj.id}, this.value)">${esc(proj.notes)}</textarea>
    </div>

    <div class="modal-foot">
      <span class="updated-note">Updated ${esc(proj.lastUpdated)}</span>
      ${chatBtn}
    </div>
  `;

  currentModalId = id;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  currentModalId = null;
  render();
}

function cycleStatus(e, id) {
  e.stopPropagation();
  const proj = projects.find(p => p.id === id);
  const idx = STATUS_CYCLE.indexOf(proj.status);
  proj.status = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
  proj.lastUpdated = today();
  commit();
  render();
}

function setStatus(id, val) {
  const proj = projects.find(p => p.id === id);
  proj.status = val;
  proj.lastUpdated = today();
  commit();
  const note = document.querySelector('#modal .updated-note');
  if (note) note.textContent = 'Updated ' + proj.lastUpdated;
}

function saveNotes(id, val) {
  const proj = projects.find(p => p.id === id);
  proj.notes = val;
  proj.lastUpdated = today();
  commit();
}

function saveNA(id, val) {
  const proj = projects.find(p => p.id === id);
  proj.nextAction = val;
  proj.lastUpdated = today();
  commit();
}

function updateStats() {
  const active  = projects.filter(p => p.status === 'active').length;
  const pending = projects.filter(p => p.status === 'pending').length;
  const blocked = projects.filter(p => p.status === 'blocked').length;
  document.getElementById('stat-active').textContent  = active  + ' active';
  document.getElementById('stat-pending').textContent = pending + ' pending';
  document.getElementById('stat-blocked').textContent = blocked + ' blocked';
}

function confirmReset() {
  if (confirm('Reset all projects to defaults? This cannot be undone.')) {
    projects = JSON.parse(JSON.stringify(DEFAULT_PROJECTS));
    commit();
    closeModal();
  }
}

/* ---------- Cross-device sync via a private GitHub Gist ---------- */
let gistToken = localStorage.getItem(TOKEN_KEY) || '';
let gistId = localStorage.getItem(GIST_ID_KEY) || '';
let syncState = 'off';      // off | connecting | synced | syncing | error
let syncStateMsg = '';
let pushTimer = null;

function ghHeaders() {
  return {
    'Authorization': 'Bearer ' + gistToken,
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28'
  };
}

async function findGist() {
  const res = await fetch('https://api.github.com/gists?per_page=100', { headers: ghHeaders() });
  if (!res.ok) throw new Error('list ' + res.status);
  const list = await res.json();
  const hit = list.find(g => g.description === GIST_DESC);
  return hit ? hit.id : '';
}

async function fetchGist(id) {
  const res = await fetch('https://api.github.com/gists/' + id, { headers: ghHeaders() });
  if (!res.ok) throw new Error('get ' + res.status);
  const g = await res.json();
  const file = g.files && g.files[GIST_FILE];
  if (!file) return null;
  let content = file.content;
  if (file.truncated && file.raw_url) content = await (await fetch(file.raw_url)).text();
  try { return JSON.parse(content); } catch(e) { return null; }
}

async function createGist(blob) {
  const res = await fetch('https://api.github.com/gists', {
    method: 'POST', headers: ghHeaders(),
    body: JSON.stringify({ description: GIST_DESC, public: false,
      files: { [GIST_FILE]: { content: JSON.stringify(blob, null, 2) } } })
  });
  if (!res.ok) throw new Error('create ' + res.status);
  return (await res.json()).id;
}

async function updateGist(id, blob) {
  const res = await fetch('https://api.github.com/gists/' + id, {
    method: 'PATCH', headers: ghHeaders(),
    body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(blob, null, 2) } } })
  });
  if (!res.ok) throw new Error('update ' + res.status);
}

function schedulePush() {
  if (!gistToken) return;            // not connected → local only
  setSyncState('syncing');
  clearTimeout(pushTimer);
  pushTimer = setTimeout(pushNow, 1200);
}

async function pushNow() {
  if (!gistToken) return;
  try {
    setSyncState('syncing');
    if (!localUpdatedAt) { localUpdatedAt = Date.now(); persist(); }
    const blob = { projects, updatedAt: localUpdatedAt };
    if (!gistId) {
      gistId = await createGist(blob);
      localStorage.setItem(GIST_ID_KEY, gistId);
    } else {
      await updateGist(gistId, blob);
    }
    setSyncState('synced');
  } catch(e) { setSyncState('error', e.message); }
}

async function pullLatest() {
  if (!gistToken || !gistId) return;
  try {
    const blob = await fetchGist(gistId);
    if (blob && Array.isArray(blob.projects) && (blob.updatedAt || 0) > localUpdatedAt) {
      projects = blob.projects;
      localUpdatedAt = blob.updatedAt;
      persist();
      if (currentModalId == null) render();
      setSyncState('synced');
    }
  } catch(e) { /* transient; ignore */ }
  loadSnapshot();
}

/* ---------- Engine snapshot (read-only view of engine.snapshot.json) ---------- */
async function loadSnapshot() {
  if (!gistToken || !gistId) return;
  try {
    const res = await fetch('https://api.github.com/gists/' + gistId, { headers: ghHeaders() });
    if (!res.ok) return;
    const g = await res.json();
    const f = g.files && g.files['engine.snapshot.json'];
    if (!f) return;
    let content = f.content;
    if (f.truncated && f.raw_url) content = await (await fetch(f.raw_url)).text();
    renderSnapshot(JSON.parse(content));
  } catch(e) { /* snapshot is optional — never break the dashboard */ }
}

function renderSnapshot(s) {
  if (!s || !s.builtAt) return;
  const mins = Math.round((Date.now() - s.builtAt) / 60000);
  const freshEl = document.getElementById('snap-fresh');
  freshEl.textContent = mins < 1 ? '快照于刚刚' : `快照于 ${mins < 60 ? mins + ' 分钟' : Math.round(mins / 60) + ' 小时'}前`;
  freshEl.className = 'snap-fresh' + (mins > 90 ? ' stale' : '');

  let html = '';
  if (s.brief) html += `<div class="snap-brief">${esc(s.brief)}</div>`;
  if (s.workhub && s.workhub.focus && s.workhub.focus.length) {
    html += `<div class="snap-row"><span class="snap-label">今日焦点</span>` +
      s.workhub.focus.map(f =>
        `<span class="snap-chip${f.done ? ' done' : ''}">${f.done ? '✓' : '○'} ${esc(f.project)} · ${esc(f.text)}</span>`
      ).join('') + `</div>`;
  }
  if (s.content && s.content.yanyuan) {
    const y = s.content.yanyuan;
    const remain = y.due - Date.now();
    const urgent = remain < 48 * 3600000;
    const dueTxt = remain < 0 ? `已过期 ${Math.ceil(-remain / 86400000)} 天` : `剩 ${Math.floor(remain / 86400000)} 天 ${Math.floor((remain % 86400000) / 3600000)} 时`;
    html += `<div class="snap-row"><span class="snap-label">内容</span>
      <span class="snap-chip${urgent ? ' urgent' : ''}">${esc(y.title)} · ${dueTxt} · 清单 ${y.checklistDone}/${y.checklistTotal}</span></div>`;
  }
  if (s.growth && s.growth.habits) {
    html += `<div class="snap-row"><span class="snap-label">习惯</span>` +
      s.growth.habits.map(h =>
        `<span class="snap-chip${h.lit ? ' done' : ''}">${h.lit ? '✓' : '○'} ${esc(h.label)}${h.streak ? ' 🔥' + h.streak : ''}</span>`
      ).join('') + `</div>`;
  }
  if (s.stocks && s.stocks.indices) {
    html += `<div class="snap-row"><span class="snap-label">指数</span>` +
      s.stocks.indices.map(i => {
        const up = (i.changePct || 0) >= 0;
        return `<span class="snap-chip" style="color:${up ? '#0f5c3a' : '#8c2a18'}">${esc(i.name)} ${i.price} ${up ? '▲' : '▼'}${Math.abs(i.changePct || 0).toFixed(2)}%</span>`;
      }).join('') + `</div>`;
  }
  if (html) {
    document.getElementById('snap-body').innerHTML = html;
    document.getElementById('engine-snapshot').style.display = 'block';
  }
}

async function connectSync(token) {
  token = (token || '').trim();
  if (!token) return;
  gistToken = token;
  localStorage.setItem(TOKEN_KEY, gistToken);
  setSyncState('connecting');
  try {
    let id = gistId || await findGist();
    if (id) {
      gistId = id;
      localStorage.setItem(GIST_ID_KEY, id);
      const blob = await fetchGist(id);
      if (blob && Array.isArray(blob.projects)) {
        if ((blob.updatedAt || 0) >= localUpdatedAt) {
          projects = blob.projects;
          localUpdatedAt = blob.updatedAt || Date.now();
          persist();
          if (currentModalId == null) render();
          setSyncState('synced');
        } else {
          await pushNow();           // local is newer → upload
        }
      } else {
        await pushNow();             // gist empty → seed it
      }
    } else {
      if (!localUpdatedAt) localUpdatedAt = Date.now();
      gistId = await createGist({ projects, updatedAt: localUpdatedAt });
      localStorage.setItem(GIST_ID_KEY, gistId);
      persist();
      setSyncState('synced');
    }
  } catch(e) { setSyncState('error', e.message); }
}

function disconnectSync() {
  gistToken = ''; gistId = '';
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(GIST_ID_KEY);
  setSyncState('off');
  closeSync();
}

function setSyncState(state, msg) {
  syncState = state;
  syncStateMsg = msg || '';
  updateSyncChip();
  updateSyncStatusLine();
}

function statusClass() {
  if (syncState === 'synced') return 'ok';
  if (syncState === 'syncing' || syncState === 'connecting') return 'busy';
  if (syncState === 'error') return 'err';
  return '';
}

function syncStatusText() {
  switch (syncState) {
    case 'connecting': return '连接中…';
    case 'synced':     return '✓ 已连接，数据已同步' + (gistId ? ' · gist ' + gistId.slice(0,8) : '');
    case 'syncing':    return '↻ 正在保存到 Gist…';
    case 'error':      return '⚠ 出错：' + (syncStateMsg || '请检查 token 是否含 gist 权限');
    default:           return gistToken ? '' : '尚未连接（数据仅存本机）';
  }
}

function updateSyncStatusLine() {
  const el = document.getElementById('sync-status-line');
  if (el) { el.textContent = syncStatusText(); el.className = 'sync-status ' + statusClass(); }
}

function updateSyncChip() {
  const el = document.getElementById('sync-chip');
  if (!el) return;
  let txt, cls = '';
  switch (syncState) {
    case 'connecting': txt = '… 连接中';   cls = 's-busy'; break;
    case 'synced':     txt = '● 已同步';   cls = 's-on';   break;
    case 'syncing':    txt = '↻ 同步中…';  cls = 's-busy'; break;
    case 'error':      txt = '⚠ 同步出错'; cls = 's-err';  break;
    default:           txt = gistToken ? '● 已连接' : '⊘ 本地模式 · 开启同步'; cls = gistToken ? 's-on' : '';
  }
  el.textContent = txt;
  el.className = 'sync-chip ' + cls;
}

function openSync() {
  const connected = !!gistToken;
  document.getElementById('sync-modal').innerHTML = `
    <div class="modal-head">
      <span class="mini-label">Cross-device sync</span>
      <button class="modal-close" onclick="closeSync()" aria-label="Close">✕</button>
    </div>
    <h2 class="modal-name" style="font-size:19px">用私密 GitHub Gist 同步</h2>
    <p class="sync-help">数据会存到你 GitHub 账号下的一个<b>私密 Gist</b>，多设备自动同步。token 只保存在<b>这台设备的浏览器</b>里，不会进入公开仓库。建议用<b>只勾 gist 权限</b>的 token，风险最小。</p>
    <a class="sync-link" href="https://github.com/settings/tokens/new?scopes=gist&description=project-monitor-sync" target="_blank" rel="noopener">→ 点这里生成一个只含 gist 权限的 token ↗</a>
    <div class="field" style="margin-top:14px">
      <label class="mini-label">GitHub token</label>
      <input class="text-input" id="sync-token" type="password" autocomplete="off" spellcheck="false"
             placeholder="ghp_… 或 github_pat_…" value="${esc(gistToken)}">
    </div>
    <div id="sync-status-line" class="sync-status ${statusClass()}">${syncStatusText()}</div>
    <div class="modal-foot">
      ${connected ? '<button class="act-btn" onclick="disconnectSync()">断开同步</button>' : '<span></span>'}
      <button class="act-btn chat-btn" onclick="doConnect()">${connected ? '重新连接 / 拉取' : '连接并同步'}</button>
    </div>
  `;
  document.getElementById('sync-overlay').classList.add('open');
}

function closeSync() {
  document.getElementById('sync-overlay').classList.remove('open');
}

function doConnect() {
  const inp = document.getElementById('sync-token');
  if (inp) connectSync(inp.value);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeSync(); } });

document.getElementById('today-label').textContent =
  new Date().toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });

window.addEventListener('focus', () => { if (gistToken) pullLatest(); });

render();
updateSyncChip();
if (gistToken) { connectSync(gistToken).then(() => loadSnapshot()); }
</script>
</body>
</html>
